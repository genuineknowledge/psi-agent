name: Electron Desktop

on:
  workflow_call:

jobs:
  electron-installer:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v7
        with:
          name: psi-agent-nuitka-windows-latest
          path: dist-exe

      - uses: actions/setup-node@v6
        with:
          node-version: "26"

      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MSYS
          release: true
          update: true
          install: >-
            bash coreutils grep sed gawk findutils diffutils which
            git openssh curl rsync tar gzip less nano
            mingw-w64-ucrt-x86_64-nodejs mingw-w64-ucrt-x86_64-uv

      - name: Build Electron installer
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File packaging/windows/build-electron-installer.ps1 `
            -UseMirror `
            -BundleMsys2 `
            -Msys2Root "${{ steps.msys2.outputs.msys2-location }}" `
            -BackendExecutablePath "dist-exe\\psi-agent.exe"

      - uses: actions/upload-artifact@v7
        with:
          name: psi-agent-electron-installer
          path: |
            src/psi_agent/gateway/electron/dist/*.exe
            src/psi_agent/gateway/electron/dist/*.blockmap
          if-no-files-found: error
