name: PyInstaller

on:
  push:
  pull_request:

jobs:
  pyinstaller:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv pip install pyinstaller
      - uses: actions/setup-node@v4
        with:
          node-version: "26"
      - run: npm ci
        working-directory: src/psi_agent/gateway/spa
      - run: npm run build
        working-directory: src/psi_agent/gateway/spa
      - shell: bash
        run: |
          uv run pyinstaller \
            --onefile \
            --name psi-agent \
            --distpath pyinstaller-dist \
            --add-data "src/psi_agent/gateway/spa/dist:psi_agent/gateway/spa/dist" \
            --collect-submodules any_llm \
            --collect-submodules mcp \
            src/psi_agent/cli.py
      - uses: actions/upload-artifact@v5
        with:
          name: psi-agent-pyinstaller-${{ matrix.os }}
          path: pyinstaller-dist/psi-agent
        if: matrix.os != 'windows-latest'
      - uses: actions/upload-artifact@v5
        with:
          name: psi-agent-pyinstaller-${{ matrix.os }}
          path: pyinstaller-dist/psi-agent.exe
        if: matrix.os == 'windows-latest'
