name: PyInstaller

on:
  push:
  pull_request:

jobs:
  pyinstaller:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv pip install pyinstaller "mcp[cli,rich,ws]" "any-llm-sdk[all]" pystray
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - run: npm ci
        working-directory: src/psi_agent/gateway/spa
      - run: npm run build
        working-directory: src/psi_agent/gateway/spa
      - shell: bash
        run: |
          uv run pyinstaller \
            --onefile \
            --name psi-agent \
            --distpath pyinstaller-dist \
            --add-data "src/psi_agent/gateway/spa/dist:psi_agent/gateway/spa/dist" \
            --add-data "src/psi_agent/gateway/dolphin.jpg:psi_agent/gateway" \
            --collect-submodules any_llm \
            --collect-submodules mcp \
            --collect-submodules pystray \
            src/psi_agent/cli.py
      - uses: actions/upload-artifact@v7
        with:
          name: psi-agent-pyinstaller-${{ matrix.os }}
          path: pyinstaller-dist/psi-agent
        if: matrix.os != 'windows-latest'
      - uses: actions/upload-artifact@v7
        with:
          name: psi-agent-pyinstaller-${{ matrix.os }}
          path: pyinstaller-dist/psi-agent.exe
        if: matrix.os == 'windows-latest'
