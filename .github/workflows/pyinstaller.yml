name: PyInstaller

on:
  push:
  pull_request:

jobs:
  pyinstaller:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv pip install pyinstaller "mcp[cli,rich,ws]" "any-llm-sdk[all]"
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - run: npm ci
        working-directory: src/psi_agent/gateway/spa
      - run: npm run build
        working-directory: src/psi_agent/gateway/spa
      - shell: bash
        run: |
          uv run pyinstaller \
            --onefile \
            --name psi-agent \
            --distpath pyinstaller-dist \
            --add-data "src/psi_agent/gateway/spa/dist:psi_agent/gateway/spa/dist" \
            --collect-submodules any_llm \
            --collect-submodules mcp \
            --collect-submodules pystray \
            src/psi_agent/cli.py
      - uses: actions/upload-artifact@v7
        with:
          name: psi-agent-pyinstaller-${{ matrix.os }}
          path: pyinstaller-dist/psi-agent
        if: matrix.os != 'windows-latest'
      - uses: actions/upload-artifact@v7
        with:
          name: psi-agent-pyinstaller-${{ matrix.os }}
          path: pyinstaller-dist/psi-agent.exe
        if: matrix.os == 'windows-latest'

  haitun-inno-setup:
    needs: pyinstaller
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v7
        with:
          name: psi-agent-pyinstaller-windows-latest
          path: dist-exe
      - shell: cmd
        run: copy dist-exe\psi-agent.exe "examples\haitun-workspace\psi-agent.exe"
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MSYS
          release: true
          update: true
          install: >-
            bash coreutils grep sed gawk findutils diffutils which
            git openssh curl rsync tar gzip less nano
            mingw-w64-ucrt-x86_64-nodejs mingw-w64-ucrt-x86_64-uv
      - shell: pwsh
        run: |
          robocopy "${{ steps.msys2.outputs.msys2-location }}" "examples\haitun-workspace\msys64" /E /NFL /NDL /NJH /NJS /NP
          if ($LASTEXITCODE -ge 8) { exit 1 } else { exit 0 }
      - shell: pwsh
        run: Remove-Item -Recurse -Force "examples\haitun-workspace\msys64\var\cache\pacman\pkg\*" -ErrorAction SilentlyContinue
      - run: choco install innosetup --no-progress
      - shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl" -OutFile "examples\haitun-workspace\ChineseSimplified.isl"
      - shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /O"installer-output" "examples\haitun-workspace\haitun.iss"'
      - uses: actions/upload-artifact@v7
        with:
          name: haitun-agent-installer
          path: installer-output/Haitun Agent Setup.exe
