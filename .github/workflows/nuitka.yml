name: Nuitka

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: nuitka-${{ github.ref }}
  cancel-in-progress: false

jobs:
  nuitka:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      NUITKA_COMMON_FLAGS: >-
        --mode=app
        --output-dir=nuitka-dist
        --output-filename=psi-agent
        --assume-yes-for-downloads
        --include-data-dir=src/psi_agent/gateway/spa/dist=psi_agent/gateway/spa/dist
        --include-package=any_llm
        --include-package=mcp
        --include-package=serper_mcp_server
        --include-package=pystray
        --include-package=fitz
        --include-package=docx
        --include-package=pptx
        --include-package=openpyxl
        --include-package=readability
        --include-package=markdownify
        --include-package=pygount
        --include-package=pygments
        --include-package=git
        --include-package=chardet
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - run: uv sync
      - run: uv pip install nuitka
      - uses: actions/setup-node@v6
        with:
          node-version: "26"
      - run: npm ci
        working-directory: src/psi_agent/gateway/spa
      - run: npm run build
        working-directory: src/psi_agent/gateway/spa
      - shell: bash
        run: uv run python -m nuitka $NUITKA_COMMON_FLAGS src/psi_agent/cli.py
        if: matrix.os == 'ubuntu-latest'
      - shell: bash
        run: uv run python -m nuitka $NUITKA_COMMON_FLAGS --output-folder-name=psi-agent --macos-app-name=psi-agent src/psi_agent/cli.py
        if: matrix.os == 'macos-latest'
      - shell: bash
        run: uv run python -m nuitka $NUITKA_COMMON_FLAGS --clang src/psi_agent/cli.py
        if: matrix.os == 'windows-latest'
      - uses: actions/upload-artifact@v7
        with:
          name: psi-agent-nuitka-${{ matrix.os }}
          path: nuitka-dist/psi-agent
        if: matrix.os == 'ubuntu-latest'
      - uses: actions/upload-artifact@v7
        with:
          name: psi-agent-nuitka-${{ matrix.os }}
          path: nuitka-dist/psi-agent.app
        if: matrix.os == 'macos-latest'
      - uses: actions/upload-artifact@v7
        with:
          name: psi-agent-nuitka-${{ matrix.os }}
          path: nuitka-dist/psi-agent.exe
        if: matrix.os == 'windows-latest'

  haitun-inno-setup:
    needs: nuitka
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: psi-agent-nuitka-windows-latest
          path: dist-exe
      - shell: cmd
        run: copy dist-exe\psi-agent.exe "examples\haitun-workspace\psi-agent.exe"
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MSYS
          release: true
          update: true
          install: >-
            bash coreutils grep sed gawk findutils diffutils which
            git openssh curl rsync tar gzip less nano
            mingw-w64-ucrt-x86_64-nodejs mingw-w64-ucrt-x86_64-uv
      - shell: pwsh
        run: |
          robocopy "${{ steps.msys2.outputs.msys2-location }}" "examples\haitun-workspace\msys64" /E /NFL /NDL /NJH /NJS /NP
          if ($LASTEXITCODE -ge 8) { exit 1 } else { exit 0 }
      - shell: pwsh
        run: Remove-Item -Recurse -Force "examples\haitun-workspace\msys64\var\cache\pacman\pkg\*" -ErrorAction SilentlyContinue
      - run: choco install innosetup --no-progress
      - shell: pwsh
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          Import-Module "$vs\Common7\Tools\Microsoft.VisualStudio.DevShell.dll"
          Enter-VsDevShell -VsInstallPath $vs -SkipAutomaticLocation -DevCmdArguments "-arch=amd64"
          rc /nologo ".github\inno-setup\haitun.rc"
          cl /nologo /O2 ".github\inno-setup\haitun.c" ".github\inno-setup\haitun.res" /Fe:".github\inno-setup\haitun.exe" /link /SUBSYSTEM:WINDOWS user32.lib
      - shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fetch via the authenticated GitHub Contents API (5000 req/hr with the
          # workflow token) instead of anonymous raw.githubusercontent.com, whose
          # low anonymous rate limit intermittently returns HTTP 429 on shared
          # Actions runner IPs. Retry with exponential backoff as a safety net.
          $uri = "https://api.github.com/repos/jrsoftware/issrc/contents/Files/Languages/ChineseSimplified.isl?ref=main"
          $out = ".github\inno-setup\ChineseSimplified.isl"
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept        = "application/vnd.github.raw"
            "User-Agent"  = "psi-agent-ci"
          }
          $maxAttempts = 5
          for ($i = 1; $i -le $maxAttempts; $i++) {
            try {
              Invoke-WebRequest -Uri $uri -Headers $headers -OutFile $out
              Write-Host "Downloaded ChineseSimplified.isl on attempt $i."
              break
            } catch {
              if ($i -eq $maxAttempts) { throw }
              $delay = [math]::Pow(2, $i)
              Write-Host "Attempt $i failed: $($_.Exception.Message). Retrying in $delay s..."
              Start-Sleep -Seconds $delay
            }
          }
      - shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /Qp /O"installer-output" ".github\inno-setup\haitun.iss"'
      - uses: actions/upload-artifact@v7
        with:
          name: haitun-agent-installer-nuitka
          path: installer-output/HaiTun Agent Setup.exe
