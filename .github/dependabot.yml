version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      all-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/src/psi_agent/gateway/spa"
    schedule:
      interval: "weekly"
    groups:
      all-deps:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/src/psi_agent/gateway/electron"
    schedule:
      interval: "weekly"
    groups:
      all-deps:
        patterns:
          - "*"
