[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "psi-agent"
dynamic = ["version"]
description = "A microkernel-style agent framework"
readme = "README.md"
authors = [{name = "Hao Zhang", email = "hzhangxyz@outlook.com"}]
license = {text = "AGPL-3.0-or-later"}
requires-python = ">=3.14"
dependencies = [
    "anyio>=4.13.0",
    "aiohttp>=3.13.5",
    "loguru>=0.7.3",
    "tyro>=1.0.13",
    "croniter>=6.2.2",
    "pyyaml>=6.0.3",
    "prompt-toolkit>=3.0.52",
    "rich>=15.0.0",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.15",
    "ty>=0.0.40",
]

[project.scripts]
psi-agent = "psi_agent.cli:main"

[tool.hatch.version]
source = "vcs"

[tool.ruff]
target-version = "py314"
line-length = 120
exclude = ["examples"]

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "ASYNC", "SIM", "C4", "B", "RUF", "N", "T20", "PLC"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
testpaths = ["tests"]
addopts = ["--strict-markers", "-ra", "--cov=src/psi_agent"]
markers = [
    "slow: slow tests (schedule-based, > 30s)",
    "real_api: tests that call external LLM APIs and require PSI_RUN_REAL_API_TESTS=1",
    "real_channel: tests that call external messaging platform APIs and require PSI_RUN_REAL_CHANNEL_TESTS=1",
]

[tool.coverage.run]
source = ["src/psi_agent"]
